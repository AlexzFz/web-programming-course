services:
  db:
    image: postgres:16-alpine
    container_name: lr11-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizdb
      POSTGRES_USER: quizuser
      POSTGRES_PASSWORD: quizpass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizuser -d quizdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE:-quiz-backend:local}
    build: .
    container_name: lr11-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://quizuser:quizpass@db:5432/quizdb
    ports:
      - "3000:3000"

volumes:
  db_data: