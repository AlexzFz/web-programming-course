<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo PWA Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        max-width: 520px;
        padding: 24px;
        border-radius: 14px;
        background: #1e293b;
        border: 1px solid #334155;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Вы офлайн</h1>
      <p>Проверьте подключение к интернету и обновите страницу. Приложение продолжит работу после reconnect.</p>
    </article>
  </body>
</html>
